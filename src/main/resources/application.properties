# Application
spring.application.name=store-management-api
server.port=8080

# Datasource (H2 in-memory)
spring.datasource.url=jdbc:h2:mem:storedb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Pagination
spring.data.web.pageable.page-serialization-mode=via_dto

# Jackson
# Reject decimal values for integer fields (e.g. 9.99 for quantity)
# instead of silently truncating to 9
spring.jackson.deserialization.accept-float-as-int=false

# Security (in-memory users, demo only)
app.security.user.username=user
app.security.user.password=userpass
app.security.admin.username=admin
app.security.admin.password=adminpass

# Rate limiting: max requests per IP within the refill window
rate-limit.capacity=20
rate-limit.duration-minutes=1